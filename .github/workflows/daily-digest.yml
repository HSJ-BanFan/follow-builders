name: Follow Builders Daily Digest

on:
  schedule:
    # 北京时间每天早上 9:00 (UTC 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  generate-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate digest
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          FB_LANGUAGE: zh
          FB_TIMEZONE: Asia/Shanghai
        run: node generate-digest-real.js

      - name: Commit daily data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add daily-data/*.json
          git diff --cached --quiet || git commit -m "Update daily data for $(date +'%Y-%m-%d')"
          git push

      - name: Report success
        if: success()
        run: |
          echo "✅ Digest generated successfully!"
          echo "📅 Date: $(date +'%Y-%m-%d')"
          echo "⏰ Time: $(date +'%H:%M:%S UTC')"

      - name: Report failure
        if: failure()
        run: |
          echo "❌ Failed to generate digest"
          exit 1
